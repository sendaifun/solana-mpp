<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solana MPP &mdash; Charge Example</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; }
    h1 { margin-bottom: 0.5rem; }
    p { color: #666; margin-top: 0; }
    button { padding: 0.75rem 1.5rem; font-size: 1rem; background: #000; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #333; }
    button:disabled { background: #999; cursor: not-allowed; }
    #output { margin-top: 1rem; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 1rem; font-size: 1.1rem; text-align: center; }
    #output:empty { display: none; }
    .error { color: red; font-family: monospace; background: #fef2f2; border-color: #fecaca; }
    #log { margin-top: 1rem; background: #f5f5f5; padding: 1rem; border-radius: 4px; white-space: pre-wrap; overflow-x: auto; font-family: monospace; font-size: 0.85rem; }
    #log:empty { display: none; }
  </style>
</head>
<body>
  <h1>Joke Machine</h1>

  <p>Pay 0.001 test tokens per joke on Solana localnet.</p>

  <p id="setup">Setting up ephemeral wallet...</p>

  <div id="ready" style="display: none;">
    <p>Balance: <span id="balance">...</span> tokens</p>

    <button type="button" id="button">Get Joke (0.001 tokens)</button>

    <div id="output"></div>
  </div>

  <div id="log"></div>

  <script type="module" src="/src/setup.ts"></script>
</body>
</html>
